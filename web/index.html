<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Local Grid Rank Tracker</title>
<link rel="stylesheet" href="./vendor/leaflet.css" />
<style>
  :root { color-scheme: light dark; --line:#8883; --muted:#7a7a7a; --accent:#1a73e8; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  #app { display:grid; grid-template-columns:380px 1fr; height:100vh; }
  #panel { padding:20px; overflow-y:auto; border-right:1px solid var(--line); }
  #map { height:100vh; background:#8881; }
  h1 { font-size:18px; margin:0 0 2px; }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:22px 0 8px; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input, select, button { width:100%; padding:9px 10px; border-radius:8px; border:1px solid #8886; background:transparent; color:inherit; font-size:14px; }
  button.primary { background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer; margin-top:14px; }
  button.primary:disabled { opacity:.5; cursor:not-allowed; }
  .badge { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.04em; padding:3px 8px; border-radius:6px; margin:6px 0; }
  .badge.live { background:#1a9850; color:#fff; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .suggest { position:relative; }
  .suggest-list { position:absolute; z-index:1000; left:0; right:0; background:Canvas; border:1px solid var(--line); border-radius:8px; margin-top:4px; max-height:280px; overflow-y:auto; box-shadow:0 8px 24px #0002; }
  .suggest-item { padding:9px 10px; cursor:pointer; border-bottom:1px solid var(--line); }
  .suggest-item:hover, .suggest-item.match { background:#1a73e814; }
  .suggest-item .n { font-weight:600; }
  .suggest-item .a { font-size:12px; color:var(--muted); }
  .suggest-item .m { font-size:11px; color:#1a9850; font-weight:600; }
  .chosen { border:1px solid #1a9850aa; background:#1a985012; border-radius:10px; padding:12px; margin-top:8px; }
  .chosen .n { font-weight:700; }
  .chosen .a { font-size:12px; color:var(--muted); }
  .chosen .ids { font-size:11px; color:var(--muted); margin-top:4px; word-break:break-all; }
  .metrics { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
  .metric { background:#8881; border-radius:10px; padding:10px; }
  .metric .v { font-size:20px; font-weight:650; }
  .metric .k { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }
  .legend span { display:inline-flex; align-items:center; gap:6px; margin-right:12px; font-size:12px; }
  .dot { width:14px; height:14px; border-radius:50%; display:inline-block; border:1px solid #0004; }
  .note { font-size:12px; color:var(--muted); }
  .err { color:#d33; font-size:13px; margin-top:8px; }
  .leaflet-tooltip.pin-label { background:transparent; border:none; box-shadow:none; padding:0; font-weight:700; color:#1a1a1a; font-size:11px; }
  .leaflet-tooltip.pin-label::before { display:none; }
  #status { font-size:13px; color:var(--muted); margin-top:10px; }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid #8884; border-top-color:var(--accent); border-radius:50%; animation:s .8s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div id="panel">
    <h1>Local Grid Rank Tracker</h1>
    <div class="badge live">LIVE · Google Maps</div>

    <h2>1 · Find your listing</h2>
    <div class="suggest">
      <label>Business name (start typing)</label>
      <input id="q" autocomplete="off" placeholder="e.g. BR1 Locksmith Bickley" />
      <div id="suggest-list" class="suggest-list" style="display:none"></div>
    </div>
    <label>Website (optional — auto-picks the right listing)</label>
    <input id="website" autocomplete="off" placeholder="br1locksmithbickley.co.uk" />
    <div id="chosen"></div>

    <h2>2 · Keyword &amp; grid</h2>
    <label>Keyword to track</label>
    <input id="keyword" autocomplete="off" placeholder="emergency locksmith" />
    <div class="row">
      <div>
        <label>Grid</label>
        <select id="gridSize">
          <option value="5">5×5 (25 pts)</option>
          <option value="7" selected>7×7 (49 pts)</option>
          <option value="9">9×9 (81 pts)*</option>
        </select>
      </div>
      <div>
        <label>Spacing</label>
        <select id="spacingM">
          <option value="250">250 m</option>
          <option value="500" selected>500 m</option>
          <option value="1000">1 km</option>
        </select>
      </div>
      <div>
        <label>Device</label>
        <select id="device">
          <option value="mobile" selected>Mobile</option>
          <option value="desktop">Desktop</option>
        </select>
      </div>
    </div>
    <div id="cost" class="note" style="margin-top:8px"></div>
    <button id="run" class="primary" disabled>Run live scan</button>
    <div id="status"></div>
    <div id="err" class="err"></div>

    <div id="results" style="display:none">
      <h2>Results</h2>
      <div class="metrics" id="metrics"></div>
      <div class="legend">
        <span><i class="dot" style="background:#1a9850"></i>1–3</span>
        <span><i class="dot" style="background:#fee08b"></i>4–10</span>
        <span><i class="dot" style="background:#f46d43"></i>11–20</span>
        <span><i class="dot" style="background:#9e9e9e"></i>20+/none</span>
      </div>
      <div id="competitors" class="note"></div>
    </div>

    <p class="note" style="margin-top:20px">
      *9×9 may exceed the free-tier per-request limit. Standardised, signed-out,
      non-personalised measurement — a repeatable relative signal, not any single
      user's live result.
    </p>
  </div>
  <div id="map"></div>
</div>

<script src="./vendor/leaflet.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let chosen = null;
let map = null, layer = null;

if (typeof L !== "undefined") {
  map = L.map("map").setView([51.5074, -0.1278], 6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "&copy; OpenStreetMap" }).addTo(map);
  layer = L.layerGroup().addTo(map);
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
function domainOf(u) { return (u || "").trim().toLowerCase().replace(/^https?:\/\//, "").replace(/^www\./, "").split("/")[0]; }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

const search = debounce(async () => {
  const q = $("q").value.trim();
  const list = $("suggest-list");
  if (q.length < 3) { list.style.display = "none"; return; }
  list.innerHTML = '<div class="suggest-item"><span class="spin"></span>Searching…</div>';
  list.style.display = "block";
  try {
    const r = await fetch("/api/suggest?q=" + encodeURIComponent(q));
    const { suggestions = [], error } = await r.json();
    if (error) { list.innerHTML = '<div class="suggest-item a">' + esc(error) + '</div>'; return; }
    if (!suggestions.length) { list.innerHTML = '<div class="suggest-item a">No listings found</div>'; return; }
    const wantDomain = domainOf($("website").value);
    list.innerHTML = suggestions.map((s, i) => {
      const isMatch = wantDomain && domainOf(s.domain) === wantDomain;
      return '<div class="suggest-item ' + (isMatch ? "match" : "") + '" data-i="' + i + '">' +
        '<div class="n">' + esc(s.name) + (isMatch ? ' <span class="m">✓ website match</span>' : '') + '</div>' +
        '<div class="a">' + esc(s.address || "") + (s.rating ? ' · ★' + s.rating + ' (' + (s.reviews||0) + ')' : '') + '</div>' +
        '</div>';
    }).join("");
    [...list.querySelectorAll(".suggest-item[data-i]")].forEach(el => {
      el.onclick = () => choose(suggestions[+el.dataset.i]);
    });
    const auto = suggestions.find(s => wantDomain && domainOf(s.domain) === wantDomain);
    if (auto) choose(auto);
  } catch (e) { list.innerHTML = '<div class="suggest-item a">Search failed</div>'; }
}, 350);

$("q").addEventListener("input", search);
$("website").addEventListener("input", search);

function choose(s) {
  chosen = s;
  $("suggest-list").style.display = "none";
  $("chosen").innerHTML =
    '<div class="chosen"><div class="n">' + esc(s.name) + '</div>' +
    '<div class="a">' + esc(s.address || "") + '</div>' +
    '<div class="ids">' + (s.domain ? 'site: ' + esc(s.domain) + ' · ' : '') +
    'Place ID: ' + esc(s.placeId || "—") + '</div></div>';
  if (map && s.lat && s.lng) { map.setView([s.lat, s.lng], 13); L.marker([s.lat, s.lng]).addTo(layer); }
  updateReady();
}

function updateReady() {
  const ready = chosen && $("keyword").value.trim();
  $("run").disabled = !ready;
  const pts = { "5":25, "7":49, "9":81 }[$("gridSize").value] || 49;
  $("cost").textContent = pts + " points · est. $" + (pts * 0.002).toFixed(2) + " per scan";
}
$("keyword").addEventListener("input", updateReady);
["gridSize","spacingM","device"].forEach(id => $(id).addEventListener("change", updateReady));
updateReady();

function colorFor(rank) {
  if (rank == null) return "#9e9e9e";
  if (rank <= 3) return "#1a9850";
  if (rank <= 10) return "#fee08b";
  if (rank <= 20) return "#f46d43";
  return "#9e9e9e";
}

$("run").addEventListener("click", async () => {
  if (!chosen) return;
  $("err").textContent = "";
  const gridSize = +$("gridSize").value;
  const pts = gridSize * gridSize;
  $("run").disabled = true;
  $("status").innerHTML = '<span class="spin"></span>Scanning ' + pts + ' points (~' + Math.ceil(pts / 24 * 6) + 's)…';
  try {
    const r = await fetch("/api/scan", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: chosen.name, placeId: chosen.placeId, cid: chosen.cid,
        website: chosen.domain, phone: chosen.phone, lat: chosen.lat, lng: chosen.lng,
        keyword: $("keyword").value.trim(), gridSize, spacingM: +$("spacingM").value, device: $("device").value,
      }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
    renderScan(data);
    $("status").textContent = "Done · actual cost ~$" + data.estCostUsd;
  } catch (e) {
    $("status").textContent = "";
    $("err").textContent = "Scan failed: " + e.message;
  } finally {
    $("run").disabled = false;
  }
});

function renderScan(data) {
  layer.clearLayers();
  const b = data.business.location;
  map.setView([b.lat, b.lng], 13);
  data.points.forEach(p => {
    const rank = p.observation.rank;
    const label = rank == null ? "×" : String(rank);
    const m = L.circleMarker([p.lat, p.lng], { radius: 15, color: "#0006", weight: 1, fillColor: colorFor(rank), fillOpacity: .85 });
    m.bindTooltip(label, { permanent: true, direction: "center", className: "pin-label" });
    const top = (p.top || []).map((t, i) => "<tr><td>" + (i+1) + "</td><td>" + esc(t.name) + "</td></tr>").join("");
    m.bindPopup("<b>Rank: " + label + "</b> (" + p.observation.bucket + ")<br>matched: " + p.observation.matchMethod +
      "<br>" + p.distanceM + " m from centre<table>" + top + "</table>");
    m.addTo(layer);
  });

  const s = data.score;
  const pct = x => (x * 100).toFixed(0) + "%";
  $("results").style.display = "block";
  $("metrics").innerHTML = [
    ["Share of Local Voice", pct(s.shareOfLocalVoice)],
    ["In top 3", pct(s.pctTop3)],
    ["In top 10", pct(s.pctTop10)],
    ["Median rank", s.medianRank == null ? "—" : s.medianRank],
    ["Strongest", s.strongestDirection || "—"],
    ["Weakest", s.weakestDirection || "—"],
  ].map(([k, v]) => '<div class="metric"><div class="v">' + v + '</div><div class="k">' + k + '</div></div>').join("");
  const c = s.dominantCompetitor;
  $("competitors").innerHTML = c ? "<b>Top competitor:</b> " + esc(c.name) + " — wins " + c.wins + " pins, avg pos " + c.avgPosition.toFixed(1) : "";
}
</script>
</body>
</html>
